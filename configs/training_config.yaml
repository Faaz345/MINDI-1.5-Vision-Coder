# ==========================================
# MINDI 1.5 Vision-Coder — Training Configuration
# ==========================================

training:
  # Hardware targets
  local_device: "cuda"          # RTX 4060 8GB — for dev/testing only
  cloud_device: "cuda"          # MI300X 192GB — for actual training
  precision: "bf16"
  
  # Hyperparameters
  epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 8
  effective_batch_size: 32      # batch_size * grad_accum
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  max_grad_norm: 1.0

  # Sequence settings
  max_seq_length: 8192
  packing: true                 # Pack short examples together

  # Checkpointing
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 5
  checkpoint_dir: "./checkpoints"
  resume_from_checkpoint: null

  # Logging
  logging_steps: 10
  log_dir: "./logs/training"
  report_to: "wandb"

  # Evaluation
  eval_strategy: "steps"
  eval_steps: 250
  eval_samples: 1000

  # Memory optimization (for RTX 4060 local testing)
  local_overrides:
    batch_size: 1
    gradient_accumulation_steps: 16
    max_seq_length: 2048
    gradient_checkpointing: true
    optim: "adamw_8bit"

wandb:
  project: "mindi-1.5-vision-coder"
  entity: "mindigenous"
  tags:
    - "mindi-1.5"
    - "lora"
    - "vision-coder"
